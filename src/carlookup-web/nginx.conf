server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build artefacts never change, so they can be cached indefinitely.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Same-origin proxy to the API container, which removes the need for CORS in production.
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Liveness probe for this container; /api/health reaches the backend instead.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Single-page app: unknown paths are routed to index.html, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
